services:
  wireguard:
    image: ghcr.io/captmicr0/docker-wireguard:latest
    container_name: wireguard
    privileged: true
    cap_add:
      - ALL
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1  # Добавим для надежности
      - net.ipv6.conf.all.disable_ipv6=1  # ОТКЛЮЧИТЬ IPv6
    environment:
      - LOCAL_SUBNETS=192.168.51.0/24
    volumes:
      - /Volume1/docker/containers/wireguard/config:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped
#    restart: always
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s
    mem_limit: 128m
    mem_reservation: 32m
    cpu_shares: 256
    ports:
      - 6006:9117
      - 6003:7878
      - 6004:8989

  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    depends_on:
      wireguard:
        condition: service_healthy
#    ports:
#      - 6006:9117
    volumes:
      - /Volume1/docker/containers/jackett:/config
      - /Volume1/films:/media
    environment:
      - PUID=1004
      - PGID=1004
      - TZ=Europe/Moscow
    network_mode: "service:wireguard"
    restart: unless-stopped
#    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cpu_shares: 512

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    depends_on:
      wireguard:
        condition: service_healthy
    network_mode: "service:wireguard"
    environment:
      - PUID=1004
      - PGID=1004
      - TZ=Europe/Moscow
    volumes:
      - /Volume1/docker/containers/radarr:/config
      - /Volume1/films:/films
      - /Volume1/qBittorrent/qBittorrent/downloads:/downloads
#    ports:
#      - "6003:7878"
    restart: unless-stopped
#    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cpu_shares: 768

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    depends_on:
      wireguard:
        condition: service_healthy
    network_mode: "service:wireguard"
    environment:
      - PUID=1004
      - PGID=1004
      - TZ=Europe/Moscow
    volumes:
      - /Volume1/docker/containers/sonarr:/config
      - /Volume1/tvshow:/serials
      - /Volume1/qBittorrent/qBittorrent/downloads:/downloads
    restart: unless-stopped
#    restart: always
    mem_limit: 512m
    mem_reservation: 256m
    cpu_shares: 768
#    ports:
#      - 8989:8989

